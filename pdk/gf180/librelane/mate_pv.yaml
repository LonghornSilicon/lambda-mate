# LibreLane Classic-flow hardening config for the mate_pv macro (INT8 P·V MAC).
#
# STATUS: REAL RTL (signed INT8 token-reduction MAC tile, bit-exact to the ACU
# MAC-array reference) — signed off on Sky130 in
# adaptive-precision-attention/openlane/mate_pv. Re-targeted to GF180MCU.
# Ported from that repo's config.json.
#
# Provenance: ../rtl/blocks/PROVENANCE.md

meta:
  version: 3
  flow: Classic

DESIGN_NAME: mate_pv

PDK: gf180mcuD

VERILOG_FILES:
  - dir::../../../rtl/mate_pv.sv

SYNTH_PARAMETERS:
  - N=4               # head-dim lanes (proxy; real target N=128)

CLOCK_PORT: clk
CLOCK_NET: clk
CLOCK_PERIOD: 40     # ns — GF180 retime (loose start)

FP_SIZING: relative
FP_CORE_UTIL: 50
PL_TARGET_DENSITY_PCT: 60

DESIGN_IS_CORE: false
IO_DELAY_CONSTRAINT: 2
CLOCK_UNCERTAINTY_CONSTRAINT: 0.1
GRT_ALLOW_CONGESTION: true
